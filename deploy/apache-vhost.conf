# Apache VirtualHost for LGU Alicia LMS (LAN + HTTPS).
# Include this from httpd-vhosts.conf and enable mod_ssl + mod_rewrite.
<VirtualHost *:80>
    ServerName lms.alicia.local
    Redirect permanent / https://lms.alicia.local/
</VirtualHost>

<VirtualHost *:443>
    ServerName lms.alicia.local
    DocumentRoot "C:/xampp/htdocs/lms/public"

    SSLEngine on
    SSLCertificateFile "C:/xampp/htdocs/lms/deploy/certs/lms.crt"
    SSLCertificateKeyFile "C:/xampp/htdocs/lms/deploy/certs/lms.key"

    <Directory "C:/xampp/htdocs/lms/public">
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require ip 192.168.1.0/24 127.0.0.1
    </Directory>

    ErrorLog "logs/lms-error.log"
    CustomLog "logs/lms-access.log" combined
</VirtualHost>
